{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
    {{ block.super }}
    <link rel="stylesheet" type="text/css" href="{% static 'css/diseno_admin.css' %}">
{% endblock %}

{% block userlinks %}
    {% if user.is_authenticated %}
        <a href="/admin/app/dashboard/" class="btn-dashboard">Ir al Dashboard KPi</a>

        <div class="user-menu-container">
            <button id="user-menu-btn" class="user-icon-btn">👤</button>
            <div id="user-dropdown" class="user-dropdown-content">
                <a href="/">Ver el sitio</a>
                <a href="/admin/password_change/">Cambiar contraseña</a>

                <form action="/admin/logout/" method="post">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Terminar sesión</button>
                </form>
            </div>
        </div>

        <script>
            // Lógica del menú
            var btn = document.getElementById('user-menu-btn');
            var menu = document.getElementById('user-dropdown');

            if(btn) {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
                };
            }

            window.onclick = function() {
                if(menu) menu.style.display = 'none';
            }
        </script>
    {% else %}
        {{ block.super }}
    {% endif %}
{% endblock %}
