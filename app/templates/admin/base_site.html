{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<meta name="color-scheme" content="light">
<style>html { color-scheme: light only !important; }</style>
<link rel="stylesheet" href="{% static 'css/base_admin.css' %}">
<link rel="stylesheet" href="{% static 'css/layout_admin.css' %}">
<link rel="stylesheet" href="{% static 'css/navigation_admin.css' %}">
<link rel="stylesheet" href="{% static 'css/components_admin.css' %}">
<link rel="stylesheet" href="{% static 'css/overrides_admin.css' %}">
{% endblock %}

{% block extrahead %}
{{ block.super }}
<link rel="icon" type="image/png" href="{% static 'images/favicon_proyecto.png' %}">
<link rel="shortcut icon" type="image/png" href="{% static 'images/favicon_proyecto.png' %}">
{% endblock %}

{% block userlinks %}
<div style="display:flex; align-items:center; gap:10px;">

    <span style="font-size:0.83rem; font-weight:600; color:#000;">
        BIENVENIDO/A, {{ user.username|upper }}.
    </span>

    <a href="/admin/app/dashboard/" class="btn-dashboard">
        IR AL DASHBOARD KPI
    </a>

    <div class="user-menu-container">
        <button id="user-menu-btn" class="user-icon-btn" type="button">
            <img src="{% static 'images/logo_user.png' %}"
                 alt="Usuario"
                 style="height:32px; width:32px; object-fit:contain; display:block;">
        </button>
        <div id="user-dropdown" class="user-dropdown-content" style="display:none; flex-direction:column;">
            <a href="/admin/password_change/">CAMBIAR CONTRASEÑA</a>
            <form action="/admin/logout/" method="post" style="margin:0;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Terminar sesión</button>
            </form>
        </div>
    </div>

</div>

<script>
(function() {
    function initMenu() {
        var btn  = document.getElementById('user-menu-btn');
        var menu = document.getElementById('user-dropdown');
        if (!btn || !menu) return;

        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        });

        document.addEventListener('click', function(e) {
            if (!btn.contains(e.target) && !menu.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') menu.style.display = 'none';
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initMenu);
    } else {
        initMenu();
    }
})();
</script>
{% endblock %}
